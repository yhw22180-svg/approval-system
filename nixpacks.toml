[phases.setup]
nixPkgs = ["nodejs", "python311"]

[phases.install]
cmds = [
  "cd approval-system/frontend && npm install",
  "cd approval-system/backend && pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd approval-system/frontend && npm run build"
]

[start]
cmd = "cd approval-system/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"