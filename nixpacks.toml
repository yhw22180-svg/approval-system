[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
    "python -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && chmod +x node_modules/.bin/vite && npm run build",
    "mkdir -p backend/static",
    "cp -r frontend/dist/* backend/static/"
]

[start]
cmd = "/opt/venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT"